<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PortableUi Zone.js Demo</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #f3f4f6;
        color: #111827;
      }

      .page {
        max-width: 1140px;
        margin: 0 auto;
        padding: 24px 16px 64px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 28px;
      }

      .demo-intro {
        margin: 0 0 8px;
        line-height: 1.6;
      }

      .demo-tip {
        margin: 0 0 24px;
        padding: 12px 16px;
        border-left: 4px solid #2563eb;
        background: #eff6ff;
        color: #1e3a8a;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>PortableUi - App + Zone.js Demo</h1>
      <p class="demo-intro">
        这个页面演示如何在 <code>App</code> 命令式 API 中结合 <code>zone.js</code>
        做异步上下文保持、双向绑定和手动 <code>markDirty()</code> 刷新。
      </p>
      <p class="demo-tip">
        提示：打开页面后，先改输入框/复选框，再点击“运行 Promise + setTimeout”，观察异步回调中的 Zone 和计数变化。
      </p>
      <div id="app"></div>
    </main>
  </body>
</html>
